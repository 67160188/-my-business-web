<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ติดต่อ Sunrise Logistics</title>
    <meta name="description" content="ข้อมูลติดต่อสำนักงานใหญ่ Sunrise Logistics และช่องทางติดต่อทั่วไป" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>

    <header id="header">
      <nav>
        <ul>
          <li><a href="index.html">หน้าแรก</a></li>
          <li><a href="about.html">เกี่ยวกับเรา</a></li>
          <li><a href="services.html">บริการขนส่ง</a></li>
          <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="page-title">ติดต่อ Sunrise Logistics</h1>

      <section class="content-section" aria-labelledby="form-heading">
        <h2 id="form-heading">สอบถามข้อมูลเพิ่มเติม</h2>
        <form class="contact-form" action="#" method="post">
          <label for="name">ชื่อ</label>
          <input type="text" id="name" name="name" placeholder="กรอกชื่อของคุณ" required />

          <label for="email">อีเมล</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required />

          <label for="message">ข้อความ</label>
          <textarea id="message" name="message" rows="5" placeholder="พิมพ์ข้อความของคุณที่นี่..." required></textarea>

          <button type="submit">ส่งข้อความ</button>
        </form>
      </section>

      <section class="content-section" aria-labelledby="hq">
        <h2 id="hq">สำนักงานใหญ่</h2>
        <p>บางแค, กรุงเทพ, ประเทศไทย</p>
        <p>
          เว็บไซต์หลัก:
          <a href="https://sunriselogistics.com" target="_blank" rel="noopener">SunriseLogistics.com</a>
        </p>
      </section>
    </main>

    <footer id="footer">
      <p>© 2025 Sunrise Logistics Co., Ltd. All rights reserved.</p>
    </footer>

  </body>
</html>
